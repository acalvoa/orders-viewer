name: Deploy

on:
  push:
    branches: [master]

env:
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  quality:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: sudo corepack enable && corepack prepare yarn@4.14.1 --activate

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --immutable

      - run: yarn lint

      - run: yarn test

  build-directus:
    name: Build & Push Directus
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./directus
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/directus:latest
            ${{ env.IMAGE_BASE }}/directus:${{ github.sha }}
          cache-from: type=gha,scope=directus
          cache-to: type=gha,mode=max,scope=directus

  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/backend:latest
            ${{ env.IMAGE_BASE }}/backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  deploy-backend:
    name: Deploy Directus & Backend
    runs-on: ubuntu-latest
    needs: [build-directus, build-backend]
    outputs:
      backend_url: ${{ steps.url.outputs.url }}
    defaults:
      run:
        working-directory: terraform
    env:
      GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
      TF_VAR_gcp_project: ${{ vars.GCP_PROJECT }}
      TF_VAR_gcp_region: ${{ vars.GCP_REGION }}
      TF_VAR_image_base: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
      TF_VAR_image_tag: ${{ github.sha }}
      TF_VAR_directus_secret: ${{ secrets.TF_DIRECTUS_SECRET }}
      TF_VAR_directus_admin_email: ${{ secrets.TF_DIRECTUS_ADMIN_EMAIL }}
      TF_VAR_directus_admin_password: ${{ secrets.TF_DIRECTUS_ADMIN_PASSWORD }}
      TF_VAR_directus_static_token: ${{ secrets.TF_DIRECTUS_STATIC_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - run: terraform init

      - run: terraform apply -auto-approve -target=module.directus -target=module.backend

      - name: Read backend URL
        id: url
        run: echo "url=$(terraform output -raw backend_url)" >> $GITHUB_OUTPUT

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:latest
            ${{ env.IMAGE_BASE }}/frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_NESTJS_URL=${{ needs.deploy-backend.outputs.backend_url }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: build-frontend
    defaults:
      run:
        working-directory: terraform
    env:
      GOOGLE_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
      TF_VAR_gcp_project: ${{ vars.GCP_PROJECT }}
      TF_VAR_gcp_region: ${{ vars.GCP_REGION }}
      TF_VAR_image_base: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
      TF_VAR_image_tag: ${{ github.sha }}
      TF_VAR_directus_secret: ${{ secrets.TF_DIRECTUS_SECRET }}
      TF_VAR_directus_admin_email: ${{ secrets.TF_DIRECTUS_ADMIN_EMAIL }}
      TF_VAR_directus_admin_password: ${{ secrets.TF_DIRECTUS_ADMIN_PASSWORD }}
      TF_VAR_directus_static_token: ${{ secrets.TF_DIRECTUS_STATIC_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init

      - run: terraform apply -auto-approve -target=module.frontend
